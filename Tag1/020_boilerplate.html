<!DOCTYPE html>
<!-- deine Mama ist dick -->

<html lang="de">
<!-- <html> ist das Wurzelelement der Seite. Mhh, lecker Ingwer-->

    <head>
    <!-- <head> enthält die Metadaten = Infos über die Seite die NICHT sichtbar sind-->

        <meta charset="UTF-8">
        <!-- Legt die Zeichencodierung fest
        UTF-8 -> Umlaute und Sonderzeichen können korrekt angezeigt werden-->

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Sorgt dafür, dass die Breite der Seite gleich der Breite des verwendeten Displays ist.
        name="vewport" -> Diese Einstellung be3trifft den sichtbaren Bereich unserer Webseite, welche wir auf unserem Gerät anschauen.-->
    
        <title>Boilerplate</title>
        <!-- Titel der Seite -> Beschriftung des Tabs + Google Suchergebnisse-->
    </head>

    <body>
        <!-- <body> enthält alles was auf der Website sichtbar ist-->

        <header>
            <!-- Kopfbereich der Seite, enthält z.B. Logo, Überschrift, Navigation, Login-->

            <h1>Hallo Hurensohn!</h1>
            <!-- <h1> ist eine Überschrift
                -> Überschrift der ersten Ordnung und darf nur EINMAL pro Seite genutzt werden-->
            <h1>Lol ich mach einfach nochmal h1</h1>
        </header>

        <main>
            <!-- Hauptteil der Seite-->

            <p>Hier beginnt eure eigentliche Webseite (Alles was ihr an Inhalten habt)</p>
            <!-- <p> steht für Paragraph = Absatz-->
        </main>

        <footer>
            <!-- Fußbereich der Seite (Copyright, Impressum, Kontakt etc.)-->

            <p>&copy; 2026 dein Name</p>
            <!-- &copy; steht für das Copyright-Zeichen
            HTML versteht manche Zeichen nicht direkt, deshalb Entities (Ersatzschreibweisen)-->
        </footer>

    </body>

</html>
